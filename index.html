<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Today</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#111827;
padding:16px;
text-align:center;
font-weight:bold;
}

.card{
background:#1f2937;
padding:15px;
margin:12px;
border-radius:14px;
border:1px solid #4b5563;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#374151;
color:white;
font-weight:bold;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #4b5563;
background:#111827;
color:white;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>🌦️ Weather Today</header>

<div class="card">
<button onclick="getLocalWeather()">🌍 Local Weather</button>
<button onclick="toggleTravel()">✈️ Other Location</button>
</div>

<div class="card hidden" id="travel">
<input id="place" placeholder="Enter city">
<button onclick="getTravelWeather()">Search</button>
<button onclick="toggleTravel()">Back</button>
</div>

<div class="card" id="result"></div>

<div class="card">
<h3>📩 Contact</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="msg" placeholder="Message">
<button onclick="sendMessage()">Send</button>
<p id="status"></p>
</div>

<script>

/* UI */
function toggleTravel(){
document.getElementById("travel").classList.toggle("hidden");
}

/* LOCAL WEATHER */
function getLocalWeather(){

let result = document.getElementById("result");

if(!navigator.geolocation){
result.innerHTML = "❌ Geolocation not supported";
return;
}

result.innerHTML = "📍 Detecting your location...";

navigator.geolocation.getCurrentPosition(
async pos => {

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;
let accuracy = pos.coords.accuracy;

result.innerHTML = `
<p>📍 Location detected</p>
<p>Latitude: ${lat.toFixed(4)}</p>
<p>Longitude: ${lon.toFixed(4)}</p>
<p>Accuracy: ±${Math.round(accuracy)} meters</p>
<hr>
`;

let place = await getPlaceName(lat,lon);
fetchWeather(lat,lon,place);

},
error=>{
result.innerHTML = "❌ GPS error: " + error.message;
},
{
enableHighAccuracy:true,
timeout:10000,
maximumAge:0
}
);
}

/* PLACE NAME */
async function getPlaceName(lat, lon){

try{
let res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`
);

let data = await res.json();

return data.display_name || `GPS (${lat.toFixed(2)}, ${lon.toFixed(2)})`;

}catch(e){
return `GPS (${lat.toFixed(2)}, ${lon.toFixed(2)})`;
}
}

/* SEARCH WEATHER */
async function getTravelWeather(){

let place = document.getElementById("place").value.trim();
let result = document.getElementById("result");

if(!place){
alert("Enter a place");
return;
}

result.innerHTML = "🔎 Searching...";

try{

let url =
"https://geocoding-api.open-meteo.com/v1/search?name=" +
encodeURIComponent(place) +
"&count=1&language=en";

let res = await fetch(url);
let data = await res.json();

if(!data?.results?.length){
result.innerHTML = "❌ Location not found";
return;
}

let lat = data.results[0].latitude;
let lon = data.results[0].longitude;

let realPlace = await getPlaceName(lat,lon);
fetchWeather(lat,lon,realPlace);

}catch(e){
result.innerHTML = "❌ Network/API error";
console.log(e);
}

}

/* WEATHER */
function fetchWeather(lat, lon, place){

const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability`;

fetch(url)
.then(response => {

if(!response.ok){
throw new Error("API error: " + response.status);
}

return response.json();

})
.then(data => {

if(!data?.hourly){
document.getElementById("result").innerHTML =
"<p>❌ Weather data not available</p>";
return;
}

/* 🌡 DATA EXTRACTION */
const hours = data.hourly.time;
const temps = data.hourly.temperature_2m;
const rain = data.hourly.precipitation_probability;

/* 🌡 CURRENT + EXTREMES */
const currentTemp = temps[0];
const maxTemp = Math.max(...temps);
const minTemp = Math.min(...temps);

/* 📦 MAIN OUTPUT */
document.getElementById("result").innerHTML = `
<h2>📍 ${place}</h2>

<div class="card">
<h3>🌡 Temperature</h3>
<p>Current: <b>${currentTemp}°C</b></p>
<p>Max: <b>${maxTemp}°C</b></p>
<p>Min: <b>${minTemp}°C</b></p>
</div>

<div class="card">
<h3>📊 Analysis</h3>
${analyzeDay(hours, temps, rain, place, lat, lon)}
</div>
`;

})
.catch(error => {

console.log(error);

document.getElementById("result").innerHTML = `
<p>❌ Failed to load weather</p>
<p style="opacity:0.7">${error.message}</p>
`;

});

}
/* ANALYZE */
function analyzeDay(hours,temp,rain,place,lat,lon){

let avg=temp.reduce((a,b)=>a+b,0)/temp.length;
let maxRain=Math.max(...rain);

let timeGroups = groupTime(hours,temp,rain);

/* FIX: no missing function anymore */
return `
<h2>${place}</h2>

<p>
<a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">
📍 View on Map
</a>
</p>

<h3>🌦️ Day Analysis</h3>

${getDrinkAdvice(avg,maxRain)}
${getClothesAdvice(avg,maxRain)}
${getFoodAdvice(avg)}

<hr>

${healthAdvice(timeGroups)}
`;

}

/* FIXED MISSING FUNCTION */
function groupTime(hours,temp,rain){

let morning=[], noon=[], evening=[];

for(let i=0;i<hours.length;i++){

let h=new Date(hours[i]).getHours();

let obj={t:temp[i],r:rain[i]};

if(h<12) morning.push(obj);
else if(h<18) noon.push(obj);
else evening.push(obj);
}

return [...morning,...noon,...evening];
}

/* CLOTHES */
function getClothesAdvice(temp, rain){

let advice = "";
let explanation = "";

/* 🌧 PLUIE */
if(rain > 60){
advice += "☔ Waterproof jacket / raincoat + closed shoes<br>";
explanation += "High precipitation increases risk of body cooling, humidity exposure and respiratory infections. Waterproof clothing prevents heat loss and keeps body temperature stable.<br>";
}
else if(rain > 30){
advice += "🌦 Light waterproof layer or umbrella recommended<br>";
explanation += "Moderate rain may cause discomfort and mild cooling. A light protective layer helps maintain thermal balance.<br>";
}

/* 🌡 TEMPÉRATURE */
if(temp < 15){
advice += "🧥 Heavy jacket, sweater, long pants<br>";
explanation += "Cold conditions increase heat loss. Layered clothing improves insulation and prevents hypothermia risk.<br>";
}
else if(temp < 22){
advice += "🧥 Light jacket or long sleeves<br>";
explanation += "Mild temperature requires moderate insulation to maintain comfort without overheating.<br>";
}
else if(temp < 30){
advice += "👕 Breathable cotton clothes, light fabrics<br>";
explanation += "Warm conditions require ventilation to regulate body temperature and avoid heat stress.<br>";
}
else{
advice += "☀️ Very light clothing, UV protection, hat<br>";
explanation += "High heat increases dehydration and UV exposure risk. Light reflective clothing improves thermoregulation.<br>";
}

return `
<h3>👕 Professional Clothing Advice</h3>
<p>${advice}</p>
<p>🧠 Health Explanation: ${explanation}</p>
`;
}
/* FOOD */
function getFoodAdvice(temp, rain){

let foods = {
cold:[
{meal:"Hot vegetable soup + whole grain bread",exp:"Improves body warmth, hydration and immune support."},
{meal:"Oatmeal with milk and banana",exp:"Slow-release energy and digestive comfort in cold climate."},
{meal:"Rice with vegetables and chicken stew",exp:"Balanced protein and carbohydrates for energy maintenance."},
{meal:"Hot tea + eggs + toast",exp:"Supports metabolism and warmth regulation."}
],

normal:[
{meal:"Grilled fish + rice + vegetables",exp:"Balanced micronutrients and healthy protein intake."},
{meal:"Chicken salad with olive oil",exp:"Supports muscle recovery and immune system."},
{meal:"Rice + legumes + vegetables",exp:"Good fiber, protein and steady energy release."},
{meal:"Fruit + yogurt + nuts",exp:"Supports digestion and gut health."}
],

hot:[
{meal:"Fresh fruits (watermelon, mango, pineapple)",exp:"Hydration and vitamin C for heat stress prevention."},
{meal:"Cold rice salad with vegetables",exp:"Light digestion to reduce metabolic heat."},
{meal:"Yogurt + fruits + honey",exp:"Supports hydration and gut balance."},
{meal:"Light fish + salad",exp:"High protein without overheating the body."}
]
};

let type = temp < 18 ? "cold" : temp < 26 ? "normal" : "hot";

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

let b = pick(foods[type]);
let l = pick(foods[type]);
let d = pick(foods[type]);

return `
<h3>🍽 Professional Nutrition Advice</h3>

<p><b>Breakfast:</b> ${b.meal}<br>🧠 ${b.exp}</p>
<p><b>Lunch:</b> ${l.meal}<br>🧠 ${l.exp}</p>
<p><b>Dinner:</b> ${d.meal}<br>🧠 ${d.exp}</p>

<p style="margin-top:10px;opacity:0.8">
⚕️ Based on climate adaptation principles: hydration, thermoregulation, and balanced macronutrients.
</p>
`;
}

/* DRINK */
function getDrinkAdvice(temp, rain){

let drinks = [];
let explanation = "";

/* 🌡 CHAUD */
if(temp >= 26){

if(rain > 50){
drinks = [
"💧 Mineral water (frequent small intake)",
"🥥 Coconut water (electrolytes)",
"🍵 Light herbal tea (temperature regulation)",
"🥤 Fresh fruit juice (vitamin boost)"
];

explanation = "Hot and humid conditions increase sweating and electrolyte loss. Hydration must focus on minerals and frequent intake to prevent dehydration and fatigue.";
}
else{
drinks = [
"💧 Cold water",
"🥥 Coconut water",
"🥤 Natural fruit juice",
"🧊 Infused water (lemon/mint)"
];

explanation = "High temperature increases water loss through sweating. Cold fluids help regulate body temperature and prevent heat stress.";
}

}

/* 🌤 TEMPÉRÉ */
else if(temp >= 18){

if(rain > 50){
drinks = [
"☕ Warm tea (ginger or herbal)",
"💧 Water (room temperature)",
"🥛 Milk (energy support)",
"🍵 Light soup broth"
];

explanation = "Rainy conditions reduce body temperature. Warm drinks help maintain internal thermal balance and reduce cold-related fatigue.";
}
else{
drinks = [
"💧 Water",
"🥤 Fresh juice",
"🥛 Milk",
"🍹 Smooth smoothie"
];

explanation = "Moderate weather requires stable hydration to support metabolism and energy levels.";
}

}

/* ❄️ FROID */
else{

if(rain > 50){
drinks = [
"🔥 Hot tea (ginger recommended)",
"☕ Coffee (moderate)",
"🍫 Hot chocolate",
"🍵 Herbal infusion"
];

explanation = "Cold and wet conditions increase risk of respiratory illness. Warm drinks support circulation and immune protection.";
}
else{
drinks = [
"☕ Tea",
"🥛 Warm milk",
"🍫 Hot chocolate",
"🍵 Herbal infusion"
];

explanation = "Cold dry conditions require warm hydration to maintain body heat and prevent energy loss.";
}

}

let drink = drinks[Math.floor(Math.random()*drinks.length)];

return `
<h3>🥤 Professional Hydration Advice</h3>
<p><b>Recommended:</b> ${drink}</p>
<p>🧠 Health Explanation: ${explanation}</p>

<p style="opacity:0.8;margin-top:8px">
⚕️ Hydration strategy is based on temperature regulation, electrolyte balance, and metabolic demand.
</p>
`;
}
/* FIXED healthAdvice (was missing before)*/
function healthAdvice(data){

if(!data || data.length === 0){
return `
<h3>🧠 Health Analysis</h3>
<p>No data available.</p>
`;
}

/* 🔍 ANALYSE RISQUES */
let rainRisk = data.filter(x => x.r > 60).length;
let heatRisk = data.filter(x => x.t > 30).length;
let coldRisk = data.filter(x => x.t < 15).length;

/* 📊 SCORE GLOBAL (0–100) */
let score = 100;

score -= rainRisk * 10;
score -= heatRisk * 8;
score -= coldRisk * 8;

if(score < 0) score = 0;

/* 🧠 INTERPRÉTATION */
let status = "";
let advice = "";

if(score >= 80){
status = "✅ Good weather conditions";
advice = "Normal activity is safe. Maintain regular hydration and balanced meals.";
}
else if(score >= 50){
status = "⚠️ Moderate risk conditions";
advice = "Be careful with hydration and clothing. Avoid long exposure to heat or rain.";
}
else{
status = "🚨 High health risk conditions";
advice = "Limit outdoor activity. Increase hydration, wear protective clothing, and monitor body temperature.";
}

/* 🌡 DETAIL RISKS */
let details = "";

if(rainRisk > 0){
details += `🌧 Rain exposure periods detected: ${rainRisk}<br>`;
}
if(heatRisk > 0){
details += `🔥 High temperature periods: ${heatRisk}<br>`;
}
if(coldRisk > 0){
details += `❄️ Low temperature periods: ${coldRisk}<br>`;
}

/* OUTPUT */
return `
<h3>🧠 Health Risk Analysis</h3>

<p><b>Status:</b> ${status}</p>
<p><b>Health Score:</b> ${score}/100</p>

<hr>

<p>${details}</p>

<p><b>Advice:</b> ${advice}</p>

<p style="margin-top:10px;opacity:0.8">
⚕️ Based on thermal stress, humidity exposure, and temperature extremes.
</p>
`;
}
</script>

<!-- FIREBASE (CORRECTED BUT SAME CONFIG) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "tenue-du-jour.firebaseapp.com",
projectId: "tenue-du-jour",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendMessage = async function(){

let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let msg=document.getElementById("msg").value.trim();
let status=document.getElementById("status");

if(!name || !email || !msg){
status.innerText="❌ Fill all fields";
return;
}

try{

await addDoc(collection(db,"messages"),{
name,email,message:msg,time:serverTimestamp()
});

status.innerText="✅ Sent!";
document.getElementById("msg").value="";

}catch(e){
status.innerText="❌ Firebase error";
console.log(e);
}

};

</script>

</body>
</html>
