<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Today</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:#111827;
padding:16px;
text-align:center;
font-weight:bold;
}

.card{
background:#1f2937;
padding:15px;
margin:12px;
border-radius:14px;
border:1px solid #4b5563;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#374151;
color:white;
font-weight:bold;
cursor:pointer;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #4b5563;
background:#111827;
color:white;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>🌦️ Weather Today</header>

<div class="card">
<button onclick="getLocalWeather()">🌍 Local Weather</button>
<button onclick="toggleTravel()">✈️ Other Location</button>
</div>

<div class="card hidden" id="travel">
<input id="place" placeholder="Enter city">
<button onclick="getTravelWeather()">Search</button>
<button onclick="toggleTravel()">Back</button>
</div>

<div class="card" id="result"></div>

<div class="card">
<h3>📩 Contact</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="msg" placeholder="Message">
<button onclick="sendMessage()">Send</button>
<p id="status"></p>
</div>

<script>

/* UI */
function toggleTravel(){
document.getElementById("travel").classList.toggle("hidden");
}

/* LOCAL WEATHER */
function getLocalWeather(){

let result = document.getElementById("result");

if(!navigator.geolocation){
result.innerHTML = "❌ Geolocation not supported";
return;
}

/* loading */
result.innerHTML = "📍 Detecting your location...";

navigator.geolocation.getCurrentPosition(
async pos => {

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;
let accuracy = pos.coords.accuracy;



/* show GPS info */
result.innerHTML = `
<p>📍 Location detected</p>
<p>Latitude: ${lat.toFixed(4)}</p>
<p>Longitude: ${lon.toFixed(4)}</p>
<p>Accuracy: ±${Math.round(accuracy)} meters</p>
<hr>
`;

/* fetch weather */
let place = await getPlaceName (lat,lon);
fetchWeather (lat,lon,place);
},
error => {

result.innerHTML = `
❌ Unable to get location<br>
Reason: ${error.message}<br><br>

👉 Try:
- Activate GPS
- Allow permission
- Use HTTPS
`;
},
{
enableHighAccuracy: true,
timeout: 10000,
maximumAge: 0
}
);
}
/* GET PLACE NAME */
async function getPlaceName(lat, lon){

try{
let res = await fetch(
`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=en`
);

let data = await res.json();

if(data?.results?.length > 0){
let p = data.results[0];

/* 🔥 MEILLEURE LOGIQUE RÉELLE */
let zone =
p?.name ||              // quartier ou ville locale
p?.admin2 ||            // district (rare mais utile)
"Unknown area";

let region = p?.admin1 || "";
let country = p?.country || "";

/* FORMAT PROPRE */
return [zone, region, country]
.filter(Boolean)
.join(", ");
}

/* fallback */
return `GPS (${lat.toFixed(2)}, ${lon.toFixed(2)})`;

}catch(e){
return `GPS (${lat.toFixed(2)}, ${lon.toFixed(2)})`;
}
}
/* SEARCH LOCATION */
async function getTravelWeather(){

let place = document.getElementById("place").value.trim();

if(!place){
alert("Enter a place");
return;
}

let result = document.getElementById("result");
result.innerHTML = "🔎 Searching...";

try{

let url =
"https://geocoding-api.open-meteo.com/v1/search?name=" +
encodeURIComponent(place) +
"&count=1&language=en";

let res = await fetch(url);

if(!res.ok){
throw new Error("HTTP " + res.status);
}

let data = await res.json();

console.log(data);

if(!data?.results?.length){
result.innerHTML = "❌ Location not found";
return;
}

let lat = data.results[0].latitude;
let lon = data.results[0].longitude;

let realPlace = await getPlaceName(lat, lon);

fetchWeather(lat, lon, realPlace);

}catch(e){
console.log(e);
result.innerHTML = "❌ Network/API error";
}

}
/* FETCH WEATHER */
function fetchWeather(lat,lon,place){

fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation_probability`)
.then(r=>r.json())
.then(data=>{

if(!data.hourly){
document.getElementById("result").innerHTML="Weather data error";
return;
}

let h=data.hourly.time;
let t=data.hourly.temperature_2m;
let r=data.hourly.precipitation_probability;

document.getElementById("result").innerHTML =
analyzeDay(h,t,r,place,lat,lon);

});
}
/* ANALYZE */
function analyzeDay(hours,temp,rain,place,lat,lon){

let avg=temp.reduce((a,b)=>a+b,0)/temp.length;
let maxRain=Math.max(...rain);

/* 🔥 CREATE TIME GROUPS */
let morning=[], noon=[], evening=[];

for(let i=0;i<hours.length;i++){
let h=new Date(hours[i]).getHours();

let obj={t:temp[i],r:rain[i]};

if(h<12) morning.push(obj);
else if(h<18) noon.push(obj);
else evening.push(obj);
}

return `
<h2>${place}</h2>

<p>
<a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">
📍 View on Map
</a>
</p>

<h3>🌦️ Day Analysis</h3>

${getDrinkAdvice(avg,maxRain)}
${getClothesAdvice(avg,maxRain)}
${getFoodAdvice(avg)}

<hr>
${healthAdvice([...morning,...noon,...evening])}
`;
}
/* CLOTHES */
function getClothesAdvice(temp, rain){

let advice="";
let explanation="";

/* pluie */
if(rain>50){
advice += "☔ Umbrella recommended<br>";
explanation += "High rain probability can cause cold exposure and illness. Staying dry helps prevent flu.<br>";
}

/* température */
if(temp<15){
advice += "🧥 Heavy jacket, sweater, long pants<br>";
explanation += "Cold weather increases energy loss. Warm clothes help maintain body temperature and prevent hypothermia.<br>";
}
else if(temp<22){
advice += "🧥 Light jacket or long sleeves<br>";
explanation += "Moderate temperature — light protection keeps comfort without overheating.<br>";
}
else if(temp<30){
advice += "👕 T-shirt, breathable clothes<br>";
explanation += "Body needs to release heat. Light clothes improve ventilation and comfort.<br>";
}
else{
advice += "☀️ Very light clothes, shorts, sunglasses<br>";
explanation += "High heat increases dehydration risk. Light clothes reduce heat stress.<br>";
}

return `
<h3>👕 Clothing Advice</h3>
<p>${advice}</p>
<p>🧠 ${explanation}</p>
`;
}
/* FOOD SYSTEM (UPGRADED 30+) */
function getFoodAdvice(temp){

const foods = {
cold:[
{meal:"Hot soup + bread",exp:"Provides warmth and easy digestion."},
{meal:"Oatmeal + milk",exp:"Rich in slow energy and keeps you full."},
{meal:"Chicken stew",exp:"High protein helps body fight cold."},
{meal:"Pasta + cheese",exp:"Carbohydrates give energy in cold weather."},
{meal:"Hot chocolate + sandwich",exp:"Boosts calories and warmth."}
],
normal:[
{meal:"Chicken salad",exp:"Balanced protein and vitamins."},
{meal:"Rice + fish",exp:"Light but nutritious meal."},
{meal:"Sandwich + juice",exp:"Quick energy and hydration."},
{meal:"Pasta + vegetables",exp:"Good balance of carbs and fiber."},
{meal:"Eggs + toast",exp:"Protein supports muscle and energy."}
],
hot:[
{meal:"Fruit salad",exp:"Rich in water and vitamins."},
{meal:"Watermelon",exp:"Very hydrating and refreshing."},
{meal:"Cold pasta",exp:"Light energy without overheating."},
{meal:"Yogurt + fruit",exp:"Easy digestion and cooling effect."},
{meal:"Salad + tuna",exp:"Protein without heaviness."}
]
};

let type = temp<18?"cold":temp<26?"normal":"hot";

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

let b = pick(foods[type]);
let l = pick(foods[type]);
let d = pick(foods[type]);

return `
<h3>🍽 Food Suggestions</h3>

<p><b>Breakfast:</b> ${b.meal}<br>🧠 ${b.exp}</p>
<p><b>Lunch:</b> ${l.meal}<br>🧠 ${l.exp}</p>
<p><b>Dinner:</b> ${d.meal}<br>🧠 ${d.exp}</p>
`;
}
/* Drink */
function getDrinkAdvice(temp, rain){

let drinks = [];
let explanation = "";

/* 🔹 CAS CHAUD */
if(temp >= 26){

if(rain > 50){
drinks = [
"🥤 Fresh juice",
"🥥 Coconut water",
"🍵 Light warm tea (for humidity)",
"💧 Mineral water"
];

explanation = "Hot and rainy weather creates humidity, which reduces sweat evaporation. Light hydration with minerals is important to avoid fatigue.";
}
else{
drinks = [
"🥶 Cold water",
"🥤 Fresh fruit juice",
"🥥 Coconut water",
"🧊 Lemon water"
];

explanation = "High heat increases sweating. Cold and hydrating drinks help maintain fluid balance and prevent dehydration.";
}

}

/* 🔹 TEMPÉRATURE MODÉRÉE */
else if(temp >= 18){

if(rain > 50){
drinks = [
"☕ Warm tea",
"🥛 Milk",
"🍵 Herbal tea",
"💧 Water"
];

explanation = "Rainy weather can cool the body. Warm drinks help maintain comfort and prevent mild cold.";
}
else{
drinks = [
"💧 Water",
"🥤 Natural juice",
"🥛 Milk",
"🍹 Smoothie"
];

explanation = "Balanced weather requires normal hydration to keep energy stable.";
}

}

/* 🔹 FROID */
else{

if(rain > 50){
drinks = [
"🔥 Hot tea",
"☕ Coffee",
"🍫 Hot chocolate",
"🍲 Soup"
];

explanation = "Cold and wet conditions increase risk of illness. Hot drinks help maintain body temperature.";
}
else{
drinks = [
"☕ Tea",
"🥛 Warm milk",
"🍫 Hot chocolate",
"🍵 Herbal tea"
];

explanation = "Cold weather requires warm drinks to support body heat and circulation.";
}

}

/* RANDOM DRINK */
let drink = drinks[Math.floor(Math.random()*drinks.length)];

return `
<h3>🥤 Smart Drink Suggestions</h3>
<p><b>Recommended:</b> ${drink}</p>
<p>🧠 ${explanation}</p>
`;
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "tenue-du-jour.firebaseapp.com",
projectId: "tenue-du-jour",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.sendMessage = async function(){
let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let msg = document.getElementById("msg").value;
let status = document.getElementById("status");

await addDoc(collection(db,"messages"),{
name,email,message:msg,time:serverTimestamp()
});

status.innerText="Message sent!";
};
</script>

</body>
</html>
